<section class="max-w-lg mx-auto p-4 relative pt-0">
  <form (submit)="$event.preventDefault(); addManualItem()" class="flex justify-center items-center gap-2">
    <input
      type="text"
      [ngModel]="searchInput()"
      (ngModelChange)="searchInput.set($event)"
      name="searchInput"
      placeholder="Chercher un aliment (ex: pomme)..."
      class="w-full border border-gray-300 rounded-lg p-2 shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
    >
    <button type="submit" tabindex="-1" class="rounded bg-green-100 hover:bg-green-300 p-2 cursor-pointer">
      <img ngSrc="/plus.svg" alt="Ajouter" height="25" width="25">
    </button>
  </form>
  <ul
    class="absolute z-10 left-3 right-14 m-1 bg-white border border-gray-200 rounded-lg shadow-xl max-h-60 overflow-y-auto"
    [class.hidden]="searchInput().length < 2"
  >
    @for (item of filteredFood(); track item.name) {
      <li
        (click)="selectItem(item)"
        (keydown.enter)="selectItem(item); $event.preventDefault()"
        (keydown.space)="selectItem(item); $event.preventDefault()"
        tabindex="0"
        role="button"
        class="flex items-center gap-3 p-3 hover:bg-blue-50 focus:bg-blue-50 focus:outline-none cursor-pointer transition border-b last:border-0 border-gray-100"
      >
        <span class="text-2xl" aria-hidden="true">{{ item.emoji }}</span>
        <span class="font-medium text-gray-800 capitalize">{{ item.name }}</span>
      </li>
    } @empty {
      <li class="p-3 text-gray-500 text-center italic text-sm">Aucun résultat trouvé.</li>
    }
  </ul>
</section>
