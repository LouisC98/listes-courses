<nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-surface-900 border-t border-surface-200 dark:border-surface-800 shadow-lg z-50 h-16 flex justify-around items-center">
  <a
    routerLink="/"
    routerLinkActive="!text-primary-500"
    [routerLinkActiveOptions]="{exact: true}"
    class="flex flex-col items-center gap-1 text-surface-400 dark:text-surface-500 hover:text-primary-500 transition cursor-pointer"
  >
    <img ngSrc="/assets/icons/home.svg" alt="Ma Liste" width="24" height="24" class="transition brightness-50 invert-50 dark:invert">
    <span class="text-xs font-medium flex items-center gap-1">
      Liste en cours
      @if (uncheckedCount() > 0) {
        <span class="min-w-[1.25rem] text-center bg-primary-500 text-white text-xs font-bold rounded-full px-1.5 py-0.5 leading-none" [attr.aria-label]="uncheckedCount() + ' articles non cochés'">
          {{ uncheckedCount() }}
        </span>
      }
    </span>
  </a>

  <a
    routerLink="/lists"
    routerLinkActive="!text-primary-500"
    class="flex flex-col items-center gap-1 text-surface-400 dark:text-surface-500 hover:text-primary-500 transition cursor-pointer"
  >
    <img ngSrc="/assets/icons/list.svg" alt="Modèles" width="24" height="24" class="transition brightness-50 invert-50 dark:invert">
    <span class="text-xs font-medium">Mes listes</span>
  </a>
</nav>
