<main>
  <section class="max-w-lg mx-auto min-h-screen bg-surface-100 dark:bg-surface-950">
      <div class="grid gap-2 my-4 p-2">
          @for (list of savedLists(); track list.id) {
              <div
                [routerLink]="['/list', list.id]"
                class="p-3 rounded-xl border border-surface-100 dark:border-surface-800 bg-white dark:bg-surface-900 shadow-sm active:scale-[0.98] md:hover:shadow-md md:hover:border-surface-200 dark:md:hover:border-surface-700 transition-all flex justify-between items-center cursor-pointer"
              >
                  <div class="flex flex-col">
                    <span class="font-semibold text-lg">{{list.name}}</span>
                    <span class="text-sm text-surface-400 dark:text-surface-500">
                      {{ list.items.length }} {{ list.items.length > 1 ? 'articles' : 'article' }}
                    </span>
                  </div>
                  <div class="flex gap-2">
                      <button (click)="$event.stopPropagation(); loadList(list)" class="bg-success-200 text-success-800 hover:bg-success-300 active:bg-success-400 dark:bg-success-900 dark:text-success-200 dark:active:bg-success-800 p-3 rounded-lg transition-colors cursor-pointer z-10" title="Charger la liste">
                          <img src="assets/icons/copy.svg" alt="Utiliser cette liste" height="25" width="25" class="dark:invert">
                      </button>
                      <button (click)="$event.stopPropagation(); deleteList(list)" class="bg-danger-200 text-danger-800 hover:bg-danger-300 active:bg-danger-400 dark:bg-danger-900 dark:text-danger-200 dark:active:bg-danger-800 p-3 rounded-lg transition-colors cursor-pointer z-10" title="Supprimer">
                          <img src="assets/icons/trash.svg" alt="Supprimer" height="25" width="25" class="dark:invert">
                      </button>
                  </div>
              </div>
          } @empty {
            <div class="flex flex-col items-center justify-center gap-3 mt-16 text-surface-400 dark:text-surface-500">
              <span class="text-5xl">🗒️</span>
              <p class="text-center text-sm">Aucune liste enregistrée.<br>Sauvegarde ta liste en cours depuis l'accueil !</p>
            </div>
          }
      </div>
  </section>
</main>
