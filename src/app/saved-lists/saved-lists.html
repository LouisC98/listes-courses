<main>
  <section class="max-w-lg mx-auto">
      <div class="grid gap-2 my-4 p-2">
          @for (list of savedLists(); track list.id) {
              <div class="p-3 rounded-xl border border-surface-100 dark:border-surface-800 bg-white dark:bg-surface-900 shadow-sm active:scale-[0.98] md:hover:shadow-md md:hover:border-surface-200 dark:md:hover:border-surface-700 transition-all flex justify-between items-center">
                  <div class="flex flex-col">
                    <span class="font-semibold text-lg">{{list.name}}</span>
                    <span class="text-sm text-surface-400 dark:text-surface-500">
                      {{ list.items.length }} {{ list.items.length > 1 ? 'articles' : 'article' }}
                    </span>
                  </div>
                  <div class="flex gap-2">
                      <a [routerLink]="['/list', list.id]" class="bg-primary-200 text-primary-800 hover:bg-primary-300 active:bg-primary-400 dark:bg-primary-900 dark:text-primary-200 dark:active:bg-primary-800 p-2 rounded-lg transition-colors cursor-pointer z-10" title="Voir">
                          <img ngSrc="/assets/icons/eye.svg" alt="Voir" height="25" width="25" class="dark:invert">
                      </a>
                      <button (click)="loadList(list)" class="bg-success-200 text-success-800 hover:bg-success-300 active:bg-success-400 dark:bg-success-900 dark:text-success-200 dark:active:bg-success-800 p-2 rounded-lg transition-colors cursor-pointer z-10" title="Charger la liste">
                          <img ngSrc="/assets/icons/copy.svg" alt="Utiliser cette liste" height="25" width="25" class="dark:invert">
                      </button>
                      <button (click)="deleteList(list)" class="bg-danger-200 text-danger-800 hover:bg-danger-300 active:bg-danger-400 dark:bg-danger-900 dark:text-danger-200 dark:active:bg-danger-800 p-2 rounded-lg transition-colors cursor-pointer z-10" title="Supprimer">
                          <img ngSrc="/assets/icons/trash.svg" alt="Supprimer" height="25" width="25" class="dark:invert">
                      </button>
                  </div>
              </div>
          }
      </div>
  </section>
</main>
