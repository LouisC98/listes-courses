<main>
  @if (list(); as myList) {
    <header class="max-w-lg mx-auto px-3 py-2 flex items-center gap-2">
      <span class="text-3xl">🗒️</span>
      @if (isRenaming()) {
        <input
          #renameInput
          type="text"
          [value]="renameValue()"
          (input)="renameValue.set(renameInput.value)"
          (blur)="confirmRename()"
          (keydown.enter)="confirmRename()"
          (keydown.escape)="cancelRename()"
          autofocus
          class="flex-1 border-b-2 border-primary-500 outline-none text-2xl font-semibold bg-transparent"
        >
      } @else {
        <h2 class="flex-1 font-semibold text-2xl truncate">{{ myList.name }}</h2>
        <button (click)="startRenaming(myList.name)" class="p-1 text-surface-400 dark:text-surface-500 hover:text-primary-500 transition cursor-pointer" title="Renommer la liste">
          <img ngSrc="/assets/icons/edit.svg" alt="Modifier" height="20" width="20" class="dark:invert">
        </button>
      }
    </header>
    <app-search-item [targetListId]="listId()"/>
    <section class="max-w-lg mx-auto">
      <ul
        class="m-1 max-h-[75vh] overflow-y-auto pb-24"
      >
        @for (item of myList.items; track item.name) {
          <li
            class="flex items-center gap-3 p-3 active:bg-primary-100 md:hover:bg-primary-50 dark:active:bg-surface-800 dark:md:hover:bg-surface-800/50 rounded-lg transition border-b last:border-0 border-surface-100 dark:border-surface-800 cursor-pointer"
          >
            <span
              class="text-2xl transition-all duration-300"
              aria-hidden="true"
              [class.grayscale]="item.basket"
              [class.opacity-75]="item.basket"
            >
            {{ item.emoji }}
          </span>
            <span class="font-medium capitalize flex-1" [class.line-through]="item.basket" [class.text-surface-500]="item.basket" [class.dark:text-surface-400]="item.basket">{{ item.name }}</span>
            <button (click)="removeItem(item)" class="bg-danger-200 text-danger-800 hover:bg-danger-300 active:bg-danger-400 dark:bg-danger-900 dark:text-danger-200 dark:active:bg-danger-800 p-2 rounded-lg transition-colors cursor-pointer z-10">
              <img ngSrc="/assets/icons/trash.svg" alt="Supprimer" height="25" width="25" class="dark:invert">
            </button>
          </li>
        } @empty {
          <li class="p-3 text-surface-500 dark:text-surface-400 text-center italic text-sm">Pas encore d'article</li>
        }
      </ul>
      <button
        (click)="loadList(myList)"
        class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 flex gap-2 justify-center items-center px-6 py-3 bg-primary-500 hover:bg-primary-700 text-white rounded-full shadow-lg shadow-primary-500/30 transition-transform active:scale-95 md:hover:scale-105 cursor-pointer min-w-55"
      >
        <span class="font-semibold">Utiliser cette liste</span>
        <img ngSrc="/assets/icons/copy.svg" alt="Utiliser" height="25" width="25" class="brightness-0 invert">
      </button>
    </section>
  } @else {
    <div class="text-center mt-10 p-4">
      <p class="text-surface-500 dark:text-surface-400 text-lg">Oups, cette liste n'existe pas !</p>
      <a routerLink="/lists" class="text-primary-600 dark:text-primary-400 underline mt-2 inline-block">Retour aux modèles</a>
    </div>
  }
</main>
