<main>
  @if (list(); as myList) {
    <header class="max-w-lg mx-auto px-3 py-2 flex items-center gap-2">
      <span class="text-3xl">🗒️</span>
      @if (isRenaming()) {
        <input
          #renameInput
          type="text"
          [value]="renameValue()"
          (input)="renameValue.set(renameInput.value)"
          (blur)="confirmRename()"
          (keydown.enter)="confirmRename()"
          (keydown.escape)="cancelRename()"
          autofocus
          class="flex-1 border-b-2 border-blue-500 outline-none text-2xl font-semibold bg-transparent"
        >
      } @else {
        <h2 class="flex-1 font-semibold text-2xl truncate">{{ myList.name }}</h2>
        <button (click)="startRenaming(myList.name)" class="p-1 text-gray-400 hover:text-blue-500 transition cursor-pointer" title="Renommer la liste">
          <img ngSrc="/edit.svg" alt="Modifier" height="20" width="20">
        </button>
      }
    </header>
    <app-search-item [targetListId]="listId()"/>
    <section class="max-w-lg mx-auto">
      <ul
        class="m-1 max-h-[75vh] overflow-y-auto pb-24"
      >
        @for (item of myList.items; track item.name) {
          <li
            class="flex items-center gap-3 p-3 hover:bg-blue-50 hover:rounded transition border-b last:border-0 border-gray-100 cursor-pointer"
          >
            <span
              class="text-2xl transition-all duration-300"
              aria-hidden="true"
              [class.grayscale]="item.basket"
              [class.opacity-75]="item.basket"
            >
            {{ item.emoji }}
          </span>
            <span class="font-medium capitalize flex-1" [class.line-through]="item.basket" [class.text-gray-500]="item.basket">{{ item.name }}</span>
            <button (click)="removeItem(item)" class="rounded bg-red-100 hover:bg-red-200 p-2 cursor-pointer z-10">
              <img ngSrc="/trash.svg" alt="Supprimer" height="25" width="25">
            </button>
          </li>
        } @empty {
          <li class="p-3 text-gray-500 text-center italic text-sm">Pas encore d'article</li>
        }
      </ul>
      <button
        (click)="loadList(myList)"
        class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 flex gap-2 justify-center items-center px-6 py-3 bg-blue-500 hover:bg-blue-700 text-white rounded-full shadow-xl transition-transform hover:scale-105 cursor-pointer min-w-55"
      >
        <span class="font-semibold">Utiliser cette liste</span>
        <img ngSrc="/use.svg" alt="Utiliser" height="25" width="25" class="brightness-0 invert">
      </button>
    </section>
  } @else {
    <div class="text-center mt-10 p-4">
      <p class="text-gray-500 text-lg">Oups, cette liste n'existe pas !</p>
      <a routerLink="/lists" class="text-blue-600 underline mt-2 inline-block">Retour aux modèles</a>
    </div>
  }
</main>
