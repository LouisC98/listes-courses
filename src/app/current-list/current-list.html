<app-search-item/>
<main>
  <section class="max-w-xl mx-auto">
    <ul
      class="m-1 max-h-[75vh] overflow-y-auto pb-24"
    >
      @for (item of items(); track item.id) {
        <li
          class="flex items-center gap-3 p-3 hover:bg-blue-50 hover:rounded transition border-b last:border-0 border-gray-100 cursor-pointer"
          (click)="toggleBasket(item.id)" role="button" tabindex="0"
        >
          <input type="checkbox" class="m-1 cursor-pointer" [checked]="item.basket">
          <span
            class="text-2xl transition-all duration-300"
            aria-hidden="true"
            [class.grayscale]="item.basket"
            [class.opacity-75]="item.basket"
          >
            {{ item.emoji }}
          </span>
          <span class="font-medium capitalize flex-1" [class.line-through]="item.basket" [class.text-gray-500]="item.basket">{{ item.name }}</span>
          <button (click)="removeItem($event, item.id)" class="rounded bg-red-100 hover:bg-red-200 p-2 cursor-pointer z-10">
            <img ngSrc="/trash.svg" alt="Supprimer" height="25" width="25">
          </button>
        </li>
      } @empty {
        <li class="p-3 text-gray-500 text-center italic text-sm">Pas encore d'article</li>
      }
    </ul>
  </section>
  <button (click)="startSaveList()" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 flex gap-2 justify-center items-center px-6 py-3 bg-blue-500 hover:bg-blue-700 text-white rounded-full shadow-xl transition-transform hover:scale-105 cursor-pointer min-w-55">
    <span class="font-semibold">Enregistrer la liste</span>
    <img class="brightness-0 invert" ngSrc="/save.svg" alt="Enregistrer" height="20" width="20">
  </button>
  @if (isSavingList()) {
    <div (mousedown)="endSavingList($event)" class="absolute bg-black/50 left-0 top-0 w-full h-full z-100">
      <form (submit)="saveList($event)" class="rounded-xl bg-white shadow top-1/2 absolute left-1/2 -translate-1/2 p-3 grid gap-2 w-75">
        <span class="text-lg">Donner un nom à cette liste :</span>
        <input #name type="text" [value]="newListName()" (input)="newListName.set(name.value)" class="border p-1 rounded" placeholder="(ex: Liste de course)">
        <button type="submit" class="flex gap-2 justify-center items-center px-6 py-3 bg-blue-500 hover:bg-blue-700 text-white rounded-xl shadow-xl transition-transform hover:scale-105 cursor-pointer font-semibold w-fit mx-auto">
          Enregistrer
          <img class="brightness-0 invert" ngSrc="/save.svg" alt="Enregistrer" height="20" width="20">
        </button>
      </form>
    </div>
  }
</main>
